name: CI - Quality

# 코드 빌드/테스트/정적 분석 워크플로 (React + TypeScript + Vite)
# Convention 검증(커밋·PR 타이틀 형식)은 ci-convention.yml 에 분리되어 있습니다.
# job `name:` 값은 GitHub Required Status Check 컨텍스트로 사용되므로 변경 금지
# (docs/ci/status-checks.md 단일 소스 참조).

on:
  pull_request:
    branches: ["**"]

env:
  NODE_VERSION: "20"

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # pnpm 버전은 package.json 의 `packageManager` 필드를 단일 소스로 사용한다.
        # action-setup v4 는 version 미지정 시 packageManager 를 자동으로 읽는다.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Prettier formatting
        run: |
          if ! pnpm format:check; then
            {
              echo "## ❌ Format Check 실패"
              echo "Prettier 포맷을 따르지 않는 파일이 있습니다."
              echo ""
              echo "\`pnpm format\` 을 실행하여 수정하세요."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "## ✅ Format Check 통과" >> "$GITHUB_STEP_SUMMARY"

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # pnpm 버전은 package.json 의 `packageManager` 필드를 단일 소스로 사용한다.
        # action-setup v4 는 version 미지정 시 packageManager 를 자동으로 읽는다.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tsc --noEmit
        run: |
          if ! pnpm typecheck; then
            {
              echo "## ❌ Type Check 실패"
              echo "TypeScript 타입 오류가 있습니다."
              echo ""
              echo "로컬에서 \`pnpm typecheck\` 으로 재현하여 수정하세요."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "## ✅ Type Check 통과" >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # pnpm 버전은 package.json 의 `packageManager` 필드를 단일 소스로 사용한다.
        # action-setup v4 는 version 미지정 시 packageManager 를 자동으로 읽는다.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: |
          if ! pnpm lint; then
            {
              echo "## ❌ Lint 실패"
              echo "ESLint 위반이 있습니다."
              echo ""
              echo "로컬에서 \`pnpm lint:fix\` 로 자동 수정 가능한 항목을 먼저 처리하세요."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "## ✅ Lint 통과" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # pnpm 버전은 package.json 의 `packageManager` 필드를 단일 소스로 사용한다.
        # action-setup v4 는 version 미지정 시 packageManager 를 자동으로 읽는다.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Vite build
        run: |
          pnpm build 2>&1 | tee build.log
          echo "## ✅ Build 성공" >> "$GITHUB_STEP_SUMMARY"

      # 번들 사이즈 게이트: 룰셋(01-architecture.md)의 "초기 진입 200 KB gzipped" 정책에 맞춰
      # gzip 압축 후 사이즈를 측정한다. raw 측정은 React 런타임만 해도 임계 초과라 의미가 없다.
      - name: Bundle size budget
        if: ${{ !cancelled() }}
        run: |
          if [ ! -d "dist/assets" ]; then
            echo "## ⚠️ dist/assets 디렉토리 없음 (빌드 실패 가능성)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # 초기 진입 청크 (index-*.js) 의 gzip 크기 합산 (gzip -c | wc -c).
          initial_gzip=0
          for f in dist/assets/index-*.js; do
            [ -f "$f" ] || continue
            sz=$(gzip -c "$f" | wc -c)
            initial_gzip=$((initial_gzip + sz))
          done
          threshold=204800   # 200 KB gzipped

          {
            echo "## 📦 번들 사이즈 (gzipped)"
            echo ""
            echo "| 항목 | 값 |"
            echo "|------|-----|"
            echo "| 초기 청크 합계 (gzip) | **${initial_gzip} B** |"
            echo "| 임계값 (gzip) | ${threshold} B (200 KB) |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${initial_gzip:-0}" -gt "$threshold" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ 초기 청크 ${initial_gzip}B(gzip)가 임계값 ${threshold}B 를 초과했습니다." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # pnpm 버전은 package.json 의 `packageManager` 필드를 단일 소스로 사용한다.
        # action-setup v4 는 version 미지정 시 packageManager 를 자동으로 읽는다.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        # `pnpm test` 뒤의 인자는 pnpm 자체 옵션으로 흡수되므로 `--` 로 분리해 vitest 로 전달한다.
        run: pnpm test -- --coverage --reporter=default --reporter=junit --outputFile.junit=./test-results.xml

      # ── 1. 가시성: 커버리지 결과를 PR Summary에 직접 표시 ────────
      - name: Coverage summary
        if: ${{ !cancelled() }}
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "## ⚠️ 커버리지 파일 없음 (테스트 실패)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          total=$(jq -r '.total.statements.pct' coverage/coverage-summary.json)
          # 부트스트랩 단계(이슈 #1) 한정 임시 임계. 룰셋 05-testing.md 의
          # 70% 목표는 테스트 커버리지 확장 후속 이슈에서 복원한다.
          threshold=0

          {
            echo "## 📊 테스트 커버리지: ${total}%"
            echo ""
            echo "| 항목 | 값 |"
            echo "|------|-----|"
            echo "| 전체 statements 커버리지 | **${total}%** |"
            echo "| 임계값 (부트스트랩 임시) | ${threshold}% |"
            echo "| 룰셋 목표 | 70% (후속 이슈에서 복원) |"
          } >> "$GITHUB_STEP_SUMMARY"

          # ── 2. CI 강제: 임계값 미달 시 에러 ───────────────────────
          if [ "$(echo "$total < $threshold" | bc -l)" -eq 1 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ 커버리지 ${total}%가 임계값 ${threshold}% 미만입니다." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage/

  e2e:
    name: E2E (smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # pnpm 버전은 package.json 의 `packageManager` 필드를 단일 소스로 사용한다.
        # action-setup v4 는 version 미지정 시 packageManager 를 자동으로 읽는다.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright 미도입 단계에서는 graceful skip — playwright.config.ts 가 추가되면
      # 자동으로 후속 단계가 실행된다. (관련 후속 이슈: PR #2 의 TODO 항목 참조)
      - name: Detect Playwright setup
        id: e2e_setup
        run: |
          if [ -f playwright.config.ts ] || [ -f playwright.config.js ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "## ⏭️ E2E (smoke) 건너뜀 — playwright.config 없음" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install Playwright browsers
        if: steps.e2e_setup.outputs.configured == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Build for preview
        if: steps.e2e_setup.outputs.configured == 'true'
        run: pnpm build

      - name: Run Playwright smoke tests
        if: steps.e2e_setup.outputs.configured == 'true'
        run: pnpm test:e2e --grep @smoke

      - name: Upload Playwright report
        if: ${{ steps.e2e_setup.outputs.configured == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
